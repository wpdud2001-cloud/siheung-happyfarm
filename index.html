<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시흥시 농작물 캘린더</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f0e8; color: #3a2e1e; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #4a7c3f, #6aab5e);
    color: white;
    padding: 24px 20px 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
  }
  header h1 { font-size: 1.8rem; font-weight: 700; }
  header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
  .header-stickers {
    display: flex; justify-content: center; gap: 8px; margin-top: 10px;
  }
  .header-stickers svg { width: 52px; height: 52px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

  .month-nav {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; padding: 14px 16px; background: #fff;
    border-bottom: 1px solid #ddd; flex-wrap: wrap;
  }
  .month-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid #c8dfc4; background: white;
    color: #4a7c3f; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .month-btn:hover { background: #e8f5e2; }
  .month-btn.active { background: #4a7c3f; color: white; border-color: #4a7c3f; }

  .season-tabs {
    display: flex; justify-content: center; gap: 8px;
    padding: 12px 16px; flex-wrap: wrap;
  }
  .season-tab {
    padding: 6px 16px; border-radius: 20px; border: 2px solid transparent;
    cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
  }
  .season-tab[data-season="봄"] { background:#fef0f5; color:#c25f8a; border-color:#f0b8d0; }
  .season-tab[data-season="봄"].active { background:#c25f8a; color:white; }
  .season-tab[data-season="여름"] { background:#edf7ed; color:#3a8c3a; border-color:#a8d8a8; }
  .season-tab[data-season="여름"].active { background:#3a8c3a; color:white; }
  .season-tab[data-season="가을"] { background:#fff5e8; color:#c87020; border-color:#f0c080; }
  .season-tab[data-season="가을"].active { background:#c87020; color:white; }
  .season-tab[data-season="겨울"] { background:#eef3fa; color:#3a6aaa; border-color:#a8c0e8; }
  .season-tab[data-season="겨울"].active { background:#3a6aaa; color:white; }

  .current-info {
    text-align: center; padding: 8px;
    font-size: 0.95rem; color: #666;
  }
  .current-info strong { color: #4a7c3f; font-size: 1.05rem; }

  .filter-bar {
    display: flex; justify-content: center; gap: 8px;
    padding: 8px 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 12px; border-radius: 14px;
    border: 1.5px solid #c8dfc4; background: white;
    color: #4a7c3f; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active { background: #4a7c3f; color: white; border-color: #4a7c3f; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 14px; padding: 16px;
    max-width: 1100px; margin: 0 auto;
  }

  .crop-card {
    background: white; border-radius: 16px; padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-left: 5px solid #aaa;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .crop-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
  .crop-card.highlight { border-left-color: #f5a623; background: #fffbf0; }

  .card-sticker {
    display: block;
    width: 48px; height: 48px; opacity: 0.92;
    margin-left: auto; margin-bottom: 6px;
    flex-shrink: 0;
  }

  .crop-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .crop-emoji { font-size: 2rem; }
  .crop-name { font-size: 1.05rem; font-weight: 700; }
  .crop-category { font-size: 0.75rem; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }

  .timeline-row { margin: 6px 0; }
  .timeline-label { font-size: 0.75rem; color: #888; margin-bottom: 3px; }
  .timeline-bar {
    display: flex; height: 12px; border-radius: 6px;
    overflow: hidden; background: #f0f0f0;
  }
  .timeline-segment { height: 100%; }

  .legend { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .tip-box {
    background: #fffbf0; border: 1px solid #f0d080;
    border-radius: 10px; padding: 8px 12px;
    margin-top: 10px; font-size: 0.8rem; color: #7a5a10;
  }

  .month-labels {
    display: flex; justify-content: space-between;
    font-size: 0.65rem; color: #aaa; padding: 0 2px; margin-top: 2px;
  }

  .status-badge {
    font-size: 0.72rem; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; margin-left: auto;
  }

  .no-result {
    text-align: center; padding: 40px; color: #aaa;
    font-size: 1rem; grid-column: 1/-1;
  }

  /* 계절 스티커 배너 */
  .season-banner {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 8px 16px;
    background: rgba(255,255,255,0.6);
  }
  .season-banner svg { width: 44px; height: 44px; }
  .season-banner-text { font-size: 0.88rem; color: #666; }

  .weather-bar {
    display: flex; justify-content: center; gap: 12px;
    padding: 10px 16px; flex-wrap: wrap;
    background: linear-gradient(135deg, #e8f4ff, #f0f8ff);
    border-bottom: 1px solid #d0e8f8;
  }
  .weather-card {
    background: white; border-radius: 14px;
    padding: 10px 18px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 6px rgba(0,100,200,0.1);
    min-width: 160px;
  }
  .weather-card .w-icon { font-size: 2rem; }
  .weather-card .w-info { font-size: 0.8rem; color: #555; }
  .weather-card .w-info strong { font-size: 1rem; color: #2a4a8a; display: block; }
  .weather-card .w-info span { font-size: 0.75rem; color: #888; }
  .weather-loading { color: #aaa; font-size: 0.85rem; padding: 12px; }

  footer {
    text-align: center; padding: 20px;
    font-size: 0.78rem; color: #999; margin-top: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>🌾 시흥시 농작물 캘린더</h1>
  <p>경기도 시흥시 기준 · 파종부터 수확까지 한눈에</p>
  <div class="header-stickers" id="headerStickers"></div>
</header>

<div class="weather-bar" id="weatherBar"><span class="weather-loading">🌤 날씨 불러오는 중...</span></div>
<div class="month-nav" id="monthNav"></div>
<div class="current-info" id="currentInfo"></div>
<div class="season-banner" id="seasonBanner"></div>

<div class="season-tabs" id="seasonTabs">
  <div class="season-tab" data-season="전체">🌍 전체</div>
  <div class="season-tab" data-season="봄">🌸 봄</div>
  <div class="season-tab" data-season="여름">☀️ 여름</div>

  <div class="season-tab" data-season="겨울">❄️ 겨울</div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="전체">전체</button>
  <button class="filter-btn" data-cat="채소">🥬 채소</button>
  <button class="filter-btn" data-cat="과일">🍅 과일·열매</button>

</div>

<div class="cards-grid" id="cardsGrid"></div>

<footer>📍 경기도 시흥시 기준 · 기후 변화에 따라 시기가 다소 달라질 수 있습니다</footer>

  { name:'고추', emoji:'🌶️', cat:'채소', season:['여름'], sow:[2,3], grow:[4,5,6,7,8], harvest:[7,8,9,10], tip:'4~5월 사이 식재, 충분한 햇빛이 중요해요!' },
  { name:'토마토', emoji:'🍅', cat:'과일', season:['여름'], sow:[2,3], grow:[4,5,6,7], harvest:[6,7,8,9], tip:'모종 이식 후 지주대를 꼭 세워주세요. 물 관리가 핵심입니다.' },
  { name:'오이', emoji:'🥒', cat:'과일', season:['여름'], sow:[4,5], grow:[5,6,7], harvest:[6,7,8], tip:'따뜻할 때 파종하고 덩굴이 잘 뻗을 수 있게 지지대를 설치하세요.' },
  { name:'감자', emoji:'🥔', cat:'뿌리', season:['봄','가을'], sow:[3,4,8], grow:[3,4,5,8,9], harvest:[6,7,10,11], tip:'봄 감자는 3~4월, 가을 감자는 8월에 심어요. 씨감자 준비가 중요해요.' },
  { name:'고구마', emoji:'🍠', cat:'뿌리', season:['여름'], sow:[5], grow:[5,6,7,8], harvest:[9,10], tip:'5월 중순~하순 모종 심기. 두둑을 높게 만들어 배수가 잘 되도록 해요.' },
  { name:'배추', emoji:'🥬', cat:'채소', season:['가을'], sow:[8,9], grow:[8,9,10], harvest:[10,11,12], tip:'김장 배추는 8월 말~9월 초 파종이 핵심! 서늘한 날씨에 잘 자랍니다.' },
  { name:'무', emoji:'🫚', cat:'뿌리', season:['가을'], sow:[8,9], grow:[9,10,11], harvest:[10,11,12], tip:'가을 무는 8월 하순~9월 파종. 깊게 갈아엎은 땅에서 잘 자랍니다.' },
  { name:'대파', emoji:'🌱', cat:'채소', season:['봄','가을'], sow:[3,4,8,9], grow:[3,4,5,6,8,9,10,11], harvest:[5,6,7,10,11,12], tip:'연중 재배 가능. 옮겨심기 전 충분히 육묘하는 것이 좋아요.' },
  { name:'마늘', emoji:'🧄', cat:'뿌리', season:['가을','겨울'], sow:[9,10], grow:[10,11,12,1,2,3,4,5], harvest:[5,6], tip:'가을에 심어 겨울을 나며 봄에 수확해요. 시흥 지역은 10월 초 파종 권장.' },
  { name:'옥수수', emoji:'🌽', cat:'곡류', season:['여름'], sow:[4,5], grow:[5,6,7], harvest:[7,8], tip:'한 구멍에 2~3알씩 파종 후 솎아내기. 바람에 쓰러지지 않게 북주기 필요.' },
  { name:'콩', emoji:'🫘', cat:'곡류', season:['여름'], sow:[5,6], grow:[6,7,8], harvest:[9,10], tip:'배수가 잘 되는 땅에서 잘 자라요. 두 포기씩 심으면 수분이 잘 됩니다.' },
  { name:'호박', emoji:'🎃', cat:'과일', season:['여름'], sow:[4,5], grow:[5,6,7,8], harvest:[7,8,9], tip:'넓은 공간이 필요해요. 덩굴이 잘 뻗을 수 있도록 공간을 확보하세요.' },
  { name:'당근', emoji:'🥕', cat:'뿌리', season:['봄','가을'], sow:[3,4,8], grow:[4,5,6,8,9,10], harvest:[6,7,10,11], tip:'씨앗이 작아 얕게 심는 것이 포인트. 솎아내기를 꼭 해주세요.' },
  { name:'브로콜리', emoji:'🥦', cat:'채소', season:['봄','가을'], sow:[3,8], grow:[3,4,5,8,9,10], harvest:[5,6,10,11], tip:'서늘한 기후에서 잘 자라요. 가을 재배 시 병충해가 적어 관리가 쉽습니다.' },
];

let currentMonth = new Date().getMonth() + 1;
let selectedSeason = '전체';
let selectedCat = '전체';

function getSeason(m) {
  if ([3,4,5].includes(m)) return '봄';
  if ([6,7,8].includes(m)) return '여름';
  if ([9,10,11]) return '가을';
  return '겨울';
}
function getSeasonForMonth(m) {
  if ([3,4,5].includes(m)) return '봄';
  if ([6,7,8].includes(m)) return '여름';
  if ([9,10,11].includes(m)) return '가을';
  return '겨울';
}

function getStatus(crop, month) {
  if (crop.harvest.includes(month)) return 'harvest';
  if (crop.grow.includes(month)) return 'grow';
  if (crop.sow.includes(month)) return 'sow';
  return null;
}

function buildHeader() {
  const svgs = [SVG.봄파종, SVG.물주기, SVG.수확기쁨, SVG.풍년];
  document.getElementById('headerStickers').innerHTML =
    svgs.map(s => `<div style="width:52px;height:52px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))">${s}</div>`).join('');
}

function buildMonthNav() {
  const colors = { '봄':'#c25f8a','여름':'#3a8c3a','가을':'#c87020','겨울':'#3a6aaa' };
  document.getElementById('monthNav').innerHTML = MONTHS.map((m,i) => {
    const mo = i+1, s = getSeasonForMonth(mo);
    return `<button class="month-btn ${mo===currentMonth?'active':''}"
      style="${mo===currentMonth?`background:${colors[s]};border-color:${colors[s]};color:white`:''}"
      onclick="selectMonth(${mo})">${m}</button>`;
  }).join('');
}

function buildInfo() {
  const s = getSeasonForMonth(currentMonth);
  const e = {'봄':'🌸','여름':'☀️','가을':'🍂','겨울':'❄️'};
  document.getElementById('currentInfo').innerHTML =
    `현재 선택: <strong>${currentMonth}월 (${e[s]} ${s})</strong> — 이 시기에 맞는 농작물을 확인하세요`;
}

function buildBanner() {
  const sticker = monthStickers[currentMonth];
  const msgs = {
    sow:'파종 시기에요! 씨앗을 준비해 보세요 🌱',
    grow:'한창 자라는 시기예요. 물과 비료를 챙겨주세요 💧',
    harvest:'수확의 계절이에요! 열심히 거둬들여요 🧺',
  };
  // 이번 달에 해당하는 상태 중 가장 많은 것
  const counts = { sow:0, grow:0, harvest:0 };
  crops.forEach(c => { const st = getStatus(c, currentMonth); if (st) counts[st]++; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  document.getElementById('seasonBanner').innerHTML =
    `<div style="width:48px;height:48px">${sticker}</div>
     <span class="season-banner-text">${msgs[top]}</span>`;
}

function buildSeasonTabs() {
  document.querySelectorAll('.season-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.season === selectedSeason));
}

function buildBar(crop) {
  const colors = { sow:'#80c980', grow:'#4a9c4a', harvest:'#e07830', null:'#f0f0f0' };
  const w = (100/12).toFixed(2)+'%';
  return `<div class="timeline-bar">
    ${Array.from({length:12},(_,i)=>{
      const st = getStatus(crop,i+1);
      return `<div class="timeline-segment" style="width:${w};background:${colors[st]};${i+1===currentMonth?'outline:2px solid #333;z-index:1':''}"></div>`;
    }).join('')}
  </div>
  <div class="month-labels">${MONTHS.map(m=>`<span>${m.replace('월','')}</span>`).join('')}</div>`;
}

function buildCards() {
  const grid = document.getElementById('cardsGrid');
  const catColors = { '채소':'#4a7c3f','과일':'#c83030','곡류':'#c87020','뿌리':'#8a5020' };
  const stColors = { harvest:'#e07830', sow:'#4a9c4a', grow:'#4a7c3f' };
  const stLabels = { sow:'🌱 지금 파종 시기', grow:'🌿 지금 재배 중', harvest:'🧺 지금 수확 시기' };

  let list = crops.filter(c =>
    (selectedCat==='전체'||c.cat===selectedCat) &&
    (selectedSeason==='전체'||c.season.includes(selectedSeason))
  );
  list = list.map(c=>({crop:c,st:getStatus(c,currentMonth)}))
    .sort((a,b)=>({harvest:0,sow:1,grow:2,null:3}[a.st]-{harvest:0,sow:1,grow:2,null:3}[b.st]));

  if (!list.length) { grid.innerHTML='<div class="no-result">해당 조건의 농작물이 없습니다 🌱</div>'; return; }

  grid.innerHTML = list.map(({crop:c,st})=>`
    <div class="crop-card ${st?'highlight':''}">

      <div class="crop-header">
        <span class="crop-emoji">${c.emoji}</span>
        <div>
          <div class="crop-name">${c.name}</div>
          <span class="crop-category" style="color:${catColors[c.cat]}">${c.cat}</span>
        </div>
        ${st ? `<span class="status-badge" style="color:${stColors[st]}">${stLabels[st]}</span>
        <div class="card-sticker">${statusStickers[st]}</div>` : ''}
      </div>
      <div class="timeline-row">
        <div class="timeline-label">📅 연간 일정</div>
        ${buildBar(c)}
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#80c980"></div>파종</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4a9c4a"></div>재배</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e07830"></div>수확</div>
      </div>
      <div class="tip-box">💡 ${c.tip}</div>
    </div>`).join('');
}

function selectMonth(m) { currentMonth=m; render(); }
function render() { buildMonthNav(); buildInfo(); buildBanner(); buildSeasonTabs(); buildCards(); }

document.getElementById('seasonTabs').addEventListener('click', e=>{
  const t=e.target.closest('.season-tab'); if(!t) return;
  selectedSeason=t.dataset.season; render();
});
document.getElementById('filterBar').addEventListener('click', e=>{
  const b=e.target.closest('.filter-btn'); if(!b) return;
  selectedCat=b.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.toggle('active',x.dataset.cat===selectedCat));
  buildCards();
});

function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤';
  if (code <= 3) return '☁️';
  if (code <= 48) return '🌫';
  if (code <= 57) return '🌦';
  if (code <= 67) return '🌧';
  if (code <= 77) return '🌨';
  if (code <= 82) return '🌧';
  if (code <= 86) return '❄️';
  return '⛈';
}
function weatherDescKo(code) {
  if (code === 0) return '맑음';
  if (code <= 2) return '대체로 맑음';
  if (code <= 3) return '흐림';
  if (code <= 48) return '안개';
  if (code <= 57) return '이슬비';
  if (code <= 67) return '비';
  if (code <= 77) return '눈';
  if (code <= 82) return '소나기';
  if (code <= 86) return '눈';
  return '천둥번개';
}
async function fetchWeather() {
  const bar = document.getElementById('weatherBar');
  bar.innerHTML = '<span class="weather-loading">🌤 날씨 불러오는 중...</span>';

  // 여러 API 순서대로 시도
  const apis = [
    async () => {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.38&longitude=126.80&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=2', { mode: 'cors' });
      const d = await res.json();
      return d.daily.weather_code.map((code, i) => ({
        label: ['오늘','내일'][i],
        date: d.daily.time[i],
        code, max: Math.round(d.daily.temperature_2m_max[i]),
        min: Math.round(d.daily.temperature_2m_min[i])
      }));
    },
    async () => {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.38&longitude=126.80&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=2');
      const d = await res.json();
      return d.daily.weather_code.map((code, i) => ({
        label: ['오늘','내일'][i],
        date: d.daily.time[i],
        code, max: Math.round(d.daily.temperature_2m_max[i]),
        min: Math.round(d.daily.temperature_2m_min[i])
      }));
    }
  ];

  for (let i = 0; i < apis.length; i++) {
    try {
      const days = await apis[i]();
      bar.innerHTML = days.map(({ label, date, code, max, min }) => {
        const [,mm,dd] = date.split('-');
        return `<div class="weather-card">
          <div class="w-icon">${weatherIcon(code)}</div>
          <div class="w-info">
            <strong>${label} (${parseInt(mm)}/${parseInt(dd)})</strong>
            ${weatherDescKo(code)} · ${max}° / <span>${min}°</span>
          </div>
        </div>`;
      }).join('');
      return; // 성공하면 종료
    } catch(e) {
      console.warn(`API ${i+1} 실패:`, e.message);
    }
  }

  // 모두 실패 시 — 날씨 직접 표시 불가 안내
  bar.innerHTML = '<span class="weather-loading">⚠️ 날씨를 불러올 수 없어요. 네트워크를 확인해 주세요.</span>';
}

buildHeader();
fetchWeather();
render();
</script>
